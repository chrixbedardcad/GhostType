name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libx11-dev xvfb
      - run: go vet -tags "webkit2_41 production" ./...
      - name: Test (with virtual display)
        run: xvfb-run go test -tags "webkit2_41 production" ./...

  release:
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            ext: .exe
            cgo: '0'
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            cgo: '1'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Linux system deps
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Embed Windows version info
        if: matrix.goos == 'windows'
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          # Extract version from internal/version/version.go (e.g. "0.1.108")
          VER=$(grep 'const Version' internal/version/version.go | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)
          # Update versioninfo.json with actual version numbers
          sed -i "s/\"Major\": 0,/\"Major\": $MAJOR,/g" versioninfo.json
          sed -i "s/\"Minor\": 1,/\"Minor\": $MINOR,/g" versioninfo.json
          sed -i "s/\"Patch\": 0,/\"Patch\": $PATCH,/g" versioninfo.json
          sed -i "s/\"FileVersion\": \"\"/\"FileVersion\": \"$VER.0\"/" versioninfo.json
          sed -i "s/\"ProductVersion\": \"\"/\"ProductVersion\": \"$VER.0\"/" versioninfo.json
          goversioninfo -64
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="production"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            TAGS="webkit2_41 production"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Default exe is windowless (tray only, no console) — recommended for daily use.
            go build -tags "$TAGS" -ldflags "-H=windowsgui" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            # Window exe shows a console window — useful for debugging.
            go build -tags "$TAGS" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}-window${{ matrix.ext }}
          else
            go build -tags "$TAGS" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          fi
      - name: Download bundled llama-server
        run: |
          # Read pinned version from source of truth.
          LLAMA_VER=$(grep 'BundledLlamaCppVersion =' llm/local.go | sed 's/.*"\(.*\)".*/\1/')
          echo "Downloading llama-server from llama.cpp release ${LLAMA_VER}"

          # Determine asset pattern.
          case "${{ matrix.goos }}/${{ matrix.goarch }}" in
            darwin/arm64)   PATTERN="macos-arm64" ;;
            darwin/amd64)   PATTERN="macos-x64"   ;;
            windows/amd64)  PATTERN="win-cpu-x64" ;;
            linux/amd64)    PATTERN="ubuntu-x64"  ;;
          esac

          # Fetch release assets JSON.
          ASSETS_JSON=$(curl -fsSL "https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/${LLAMA_VER}")
          ASSET_URL=$(echo "$ASSETS_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              name = a['name']
              if '${PATTERN}' in name and not any(x in name for x in ['cuda','vulkan','rocm','sycl','opencl','hip']) and (name.endswith('.zip') or name.endswith('.tar.gz')):
                  print(a['browser_download_url'])
                  break
          ")

          echo "Downloading: ${ASSET_URL}"
          ARCHIVE_NAME=$(basename "$ASSET_URL")
          curl -fsSL -o "$ARCHIVE_NAME" "$ASSET_URL"

          # Extract llama-server from archive.
          if echo "$ARCHIVE_NAME" | grep -q '.tar.gz'; then
            tar xzf "$ARCHIVE_NAME"
          else
            unzip -o "$ARCHIVE_NAME"
          fi

          # Find the binary (may be in a subdirectory).
          if [ "${{ matrix.goos }}" = "windows" ]; then
            FOUND=$(find . -name 'llama-server.exe' -type f | head -1)
            cp "$FOUND" llama-server.exe
            echo "Found: $FOUND -> llama-server.exe"
          else
            FOUND=$(find . -name 'llama-server' -type f | head -1)
            if [ "${{ matrix.goos }}" = "linux" ]; then
              cp "$FOUND" llama-server-linux-amd64
              chmod +x llama-server-linux-amd64
              echo "Found: $FOUND -> llama-server-linux-amd64"
            else
              cp "$FOUND" llama-server
              chmod +x llama-server
              echo "Found: $FOUND -> llama-server (macOS)"
            fi
          fi

          # Clean up archive and extracted dirs.
          rm -f "$ARCHIVE_NAME"
      - name: Import signing certificate
        if: matrix.goos == 'darwin' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > cert.p12
          KEYCHAIN="build.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          rm cert.p12
      - name: Bundle macOS .app
        if: matrix.goos == 'darwin'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh ghostspell-${{ matrix.goos }}-${{ matrix.goarch }} ${{ matrix.goarch }}
      - name: Notarize macOS DMG
        if: matrix.goos == 'darwin' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="GhostSpell-darwin-${{ matrix.goarch }}.dmg"
          echo "Submitting ${DMG} for notarization..."

          # Submit and capture the submission ID
          SUBMIT_OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json)
          echo "$SUBMIT_OUT"
          SUB_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUB_ID"

          # Poll for up to 30 minutes
          for i in $(seq 1 60); do
            sleep 30
            STATUS_OUT=$(xcrun notarytool info "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) || true
            STATUS=$(echo "$STATUS_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" 2>/dev/null || echo "Unknown")
            echo "Attempt $i/60: status=$STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted!"
              xcrun stapler staple "$DMG"
              echo "Stapled successfully."
              exit 0
            elif [ "$STATUS" = "Invalid" ]; then
              echo "Notarization rejected. Fetching log..."
              xcrun notarytool log "$SUB_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              echo "::error::Notarization was rejected by Apple."
              exit 1
            fi
          done

          echo "::warning::Notarization still in progress after 30 minutes. DMG is signed but not stapled."
          echo "The DMG is still Developer ID signed and will work — Gatekeeper checks online."
          exit 0
      - uses: actions/upload-artifact@v4
        if: matrix.goos != 'darwin'
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ghostspell-*
            llama-server*
      - uses: actions/upload-artifact@v4
        if: matrix.goos == 'darwin'
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: GhostSpell-darwin-*.dmg

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
