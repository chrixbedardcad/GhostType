name: Create Code Review Issue
on:
  push:
    branches:
      - claude/code-review-analysis-e6uEU
    paths:
      - CODE_REVIEW.md

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create issue from CODE_REVIEW.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if issue already exists
          EXISTING=$(gh issue list --repo ${{ github.repository }} --search "Comprehensive Code Review: Findings" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, updating body..."
            gh issue edit "$EXISTING" --repo ${{ github.repository }} --body-file CODE_REVIEW.md
          else
            gh issue create \
              --repo ${{ github.repository }} \
              --title "Comprehensive Code Review: Findings & Recommendations" \
              --body-file CODE_REVIEW.md
          fi
