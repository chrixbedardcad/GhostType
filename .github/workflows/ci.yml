name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libx11-dev xvfb
      - run: go vet -tags "webkit2_41 production" ./...
      - name: Test (with virtual display)
        run: xvfb-run go test -tags "webkit2_41 production" ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            cgo: '1'
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            cgo: '1'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up MinGW (Windows)
        if: matrix.goos == 'windows'
        run: |
          C:/msys64/usr/bin/pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja
          echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
      - name: Install Linux system deps
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Build Ghost-AI static libraries
        run: |
          chmod +x scripts/build-ghostai.sh
          ./scripts/build-ghostai.sh
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="production ghostai"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            TAGS="webkit2_41 production ghostai"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Static link MinGW runtime (libwinpthread, libgcc, libstdc++) so users don't need DLLs.
            # Default exe is windowless (tray only, no console) — recommended for daily use.
            go build -tags "$TAGS" -ldflags "-H=windowsgui -extldflags '-static'" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            # Window exe shows a console window — useful for debugging.
            go build -tags "$TAGS" -ldflags "-extldflags '-static'" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}-window${{ matrix.ext }}
          else
            go build -tags "$TAGS" -o ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          fi
      - name: Bundle macOS .app
        if: matrix.goos == 'darwin'
        run: |
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh ghostspell-${{ matrix.goos }}-${{ matrix.goarch }} ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        if: matrix.goos != 'darwin'
        with:
          name: ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghostspell-*
      - uses: actions/upload-artifact@v4
        if: matrix.goos == 'darwin'
        with:
          name: ghostspell-${{ matrix.goos }}-${{ matrix.goarch }}
          path: GhostSpell-darwin-*.dmg
