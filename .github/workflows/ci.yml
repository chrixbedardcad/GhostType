name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libx11-dev xvfb
      - run: go vet -tags "webkit2_41 production" ./...
      - name: Test (with virtual display)
        run: xvfb-run go test -tags "webkit2_41 production" ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            ext: .exe
            cgo: '0'
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            ext: ""
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            cgo: '1'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install Linux system deps
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          TAGS="production"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            TAGS="webkit2_41 production"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Default exe is windowless (tray only, no console) — recommended for daily use.
            go build -tags "$TAGS" -ldflags "-H=windowsgui" -o ghosttype-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            # Window exe shows a console window — useful for debugging.
            go build -tags "$TAGS" -o ghosttype-${{ matrix.goos }}-${{ matrix.goarch }}-window${{ matrix.ext }}
          fi
      - name: Bundle macOS .app
        if: matrix.goos == 'darwin'
        run: |
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh ghosttype-${{ matrix.goos }}-${{ matrix.goarch }} ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        if: matrix.goos != 'darwin'
        with:
          name: ghosttype-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghosttype-*
      - uses: actions/upload-artifact@v4
        if: matrix.goos == 'darwin'
        with:
          name: ghosttype-${{ matrix.goos }}-${{ matrix.goarch }}
          path: GhostType-darwin-*.dmg
