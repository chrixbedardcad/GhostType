<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(30, 30, 36, 0.88);
    border-radius: 20px;
    padding: 6px 14px 6px 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .ghost-wrap {
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-5px); }
    100% { transform: translateY(0px); }
  }
  .ghost-wrap img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .prompt-icon {
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }
  .prompt-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    white-space: nowrap;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timer {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-variant-numeric: tabular-nums;
    min-width: 20px;
  }
  .sep {
    width: 1px;
    height: 16px;
    background: rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="pill">
  <div class="ghost-wrap">
    <img src="/ghostspell-ghost.png" alt="">
  </div>
  <span class="prompt-icon" id="pi"></span>
  <span class="prompt-name" id="pn"></span>
  <div class="sep"></div>
  <div class="timer" id="t">0s</div>
</div>
<script>
var _start = Date.now();
var _iv = null;

// Read prompt data from the window title (set via native SetTitle API,
// not ExecJS — guaranteed reliable on all platforms).
// Format: "icon|name"
function readPromptFromTitle() {
  var t = document.title || '';
  var idx = t.indexOf('|');
  if (idx >= 0) {
    document.getElementById('pi').textContent = t.substring(0, idx);
    document.getElementById('pn').textContent = t.substring(idx + 1);
  }
}

function startTimer() {
  _start = Date.now();
  document.getElementById('t').textContent = '0s';
  readPromptFromTitle();
  if (_iv) clearInterval(_iv);
  _iv = setInterval(function() {
    var s = Math.floor((Date.now() - _start) / 1000);
    document.getElementById('t').textContent = s + 's';
  }, 1000);
}

// ExecJS fallback — still works if ExecJS lands.
function setPrompt(icon, name) {
  document.getElementById('pi').textContent = icon || '';
  document.getElementById('pn').textContent = name || '';
}

// Start timer + read prompt when the window becomes visible.
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) startTimer();
});
window.addEventListener('focus', startTimer);
</script>
</body>
</html>
