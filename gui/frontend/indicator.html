<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(30, 30, 36, 0.88);
    border-radius: 20px;
    padding: 6px 14px 6px 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .ghost-wrap {
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-5px); }
    100% { transform: translateY(0px); }
  }
  .ghost-wrap img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .prompt-icon {
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }
  .prompt-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timer {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-variant-numeric: tabular-nums;
    min-width: 20px;
  }
  .sep {
    width: 1px;
    height: 16px;
    background: rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="pill">
  <div class="ghost-wrap">
    <img src="/ghostspell-ghost.png" alt="">
  </div>
  <span class="prompt-icon" id="pi"></span>
  <span class="prompt-name" id="pn"></span>
  <div class="sep" id="sep"></div>
  <div class="timer" id="t">0s</div>
</div>
<script>
// Timer and prompt are controlled entirely by ExecJS from Go.
// No auto-start — the page just renders the static ghost animation.
// Go calls ExecJS to set prompt icon/name and start/stop the timer.
</script>
</body>
</html>
