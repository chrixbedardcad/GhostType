<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ghost-wrap {
    animation: float 1.8s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.4))
            drop-shadow(0 0 30px rgba(139, 92, 246, 0.25));
  }
  @keyframes float {
    0%   { transform: translateY(0px);  opacity: 0.7; }
    50%  { transform: translateY(-12px); opacity: 1; }
    100% { transform: translateY(0px);  opacity: 0.7; }
  }
  .ghost-wrap img {
    width: 80px;
    height: 80px;
    object-fit: contain;
  }
  .dots {
    text-align: center;
    margin-top: 4px;
    font-family: -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
    color: rgba(139, 92, 246, 0.9);
    letter-spacing: 3px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div>
  <div class="ghost-wrap">
    <img src="/ghostspell-ghost.png" alt="GhostSpell">
  </div>
  <div class="dots">&bull; &bull; &bull;</div>
</div>
</body>
</html>
