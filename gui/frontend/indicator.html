<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0; /* hidden until ShowIndicator navigates with params */
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(30, 30, 36, 0.88);
    border-radius: 20px;
    padding: 6px 14px 6px 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .ghost-wrap {
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-5px); }
    100% { transform: translateY(0px); }
  }
  .ghost-wrap img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .prompt-icon {
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }
  .prompt-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timer {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-variant-numeric: tabular-nums;
    min-width: 20px;
  }
  .sep {
    width: 1px;
    height: 16px;
    background: rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="pill">
  <div class="ghost-wrap">
    <img src="/ghostspell-ghost.png" alt="">
  </div>
  <span class="prompt-icon" id="pi"></span>
  <span class="prompt-name" id="pn"></span>
  <div class="sep" id="sep"></div>
  <div class="timer" id="t">0s</div>
  <span id="ml" style="font-size:10px;color:rgba(255,255,255,0.4);margin-left:2px"></span>
</div>
<script>
// Only show content when navigated with URL params (ShowIndicator).
// Initial load has no params → body stays opacity:0 (invisible to user,
// visible to WebView2 so ExecJS works).
if (window.location.search) {
  document.body.style.opacity = '1';
}
var _p = new URLSearchParams(window.location.search);
var _icon = _p.get('i') || '';
var _name = _p.get('n') || '';
var _model = _p.get('m') || '';
var _pop = _p.get('pop') === '1';

document.getElementById('pi').textContent = _icon;
document.getElementById('pn').textContent = _name;
document.getElementById('ml').textContent = _model;

if (_pop) {
  document.getElementById('sep').style.display = 'none';
  document.getElementById('t').style.display = 'none';
} else if (window.location.search) {
  // Only start timer when navigated with params (ShowIndicator).
  // Store interval ID on window so HideIndicator's navigation clears it
  // by loading a fresh page (no params = no timer started).
  var _start = Date.now();
  window._iv = setInterval(function() {
    document.getElementById('t').textContent = Math.floor((Date.now() - _start) / 1000) + 's';
  }, 1000);
}
</script>
</body>
</html>
